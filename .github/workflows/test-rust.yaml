name: test-rust

on:
  push:
    branches:
      - master
      - main
      - rust-api
    paths:
      - '.github/workflows/test-rust.yaml'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'rust/**'
      - 'rust-api-examples/**'
  workflow_dispatch:

concurrency:
  group: test-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Case 1: Build native libs from source, then test Rust crate via local path
  test-from-source:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, ubuntu-22.04-arm]
        link: [shared, static]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build piper-phonemize
        shell: bash
        run: |
          mkdir build
          cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DBUILD_SHARED_LIBS=${{ matrix.link == 'shared' && 'ON' || 'OFF' }} \
            -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
            -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
            ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) install

      - name: Test
        shell: bash
        run: |
          export PIPER_PHONEMIZE_LIB_DIR=$PWD/build/install/lib
          if [ "${{ matrix.link }}" = "shared" ]; then
            if [ "$(uname)" = "Linux" ]; then
              export LD_LIBRARY_PATH=$PIPER_PHONEMIZE_LIB_DIR:$LD_LIBRARY_PATH
            fi
          fi
          cd rust-api-examples
          # Switch to local path for from-source testing
          sed -i.bak 's|^piper-phonemize= .*|# &|' Cargo.toml
          sed -i.bak 's|^# \(piper-phonemize = { path.*\)|\1|' Cargo.toml
          cargo run --example phonemize --no-default-features --features ${{ matrix.link }}
          cargo run --example multiple_languages --no-default-features --features ${{ matrix.link }}

  # Case 2: Download prebuilt libs from crates.io (no local build)
  test-from-crates:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, ubuntu-22.04-arm]
        link: [shared, static]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        shell: bash
        run: |
          cd rust-api-examples
          # Published crate is already configured in Cargo.toml
          cargo run --example phonemize --no-default-features --features ${{ matrix.link }}
          cargo run --example multiple_languages --no-default-features --features ${{ matrix.link }}
