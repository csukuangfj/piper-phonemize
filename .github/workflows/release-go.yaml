name: release-go

on:
  push:
    branches:
      - release
      - release-go
      - go-api
  workflow_dispatch:

jobs:
  release-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip curl unzip
          pip3 install jinja2

      - name: Set up SSH key
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MY_GITHUB_SSH_KEY }}" > ~/.ssh/github
          chmod 600 ~/.ssh/github
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add ~/.ssh/github
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat scripts/go/ssh_config >> ~/.ssh/config

      - name: Release Go packages
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          cd scripts/go
          bash release.sh
