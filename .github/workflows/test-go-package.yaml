name: test-go-package

on:
  push:
    branches:
      - go-api
  workflow_dispatch:

jobs:
  test-go-package-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Wait for Go proxy
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
          curl -sS "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" || true
          for i in $(seq 1 40); do
            echo "Attempt $i/40: checking..."
            if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
              echo "Available!"
              break
            fi
            echo "Not ready yet, sleeping 30s..."
            sleep 30
          done

      - name: Test released Go package
        run: |
          cd go-api-examples
          go mod tidy
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-package-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Wait for Go proxy
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
          curl -sS "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" || true
          for i in $(seq 1 40); do
            echo "Attempt $i/40: checking..."
            if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
              echo "Available!"
              break
            fi
            echo "Not ready yet, sleeping 30s..."
            sleep 30
          done

      - name: Test released Go package
        run: |
          cd go-api-examples
          go mod tidy
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-package-linux-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v2
        with:
          platforms: arm

      - name: Wait for Go proxy and test
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm32v7/debian:bullseye \
            bash -c '
              set -ex
              apt-get update
              apt-get install -y curl ca-certificates golang-go

              # Download espeak-ng-data
              curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
              tar xvf espeak-ng-data.tar.bz2

              # Wait for Go proxy
              VERSION='"'$VERSION'"'
              echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
              for i in $(seq 1 40); do
                echo "Attempt $i/40: checking..."
                if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
                  echo "Available!"
                  break
                fi
                echo "Not ready yet, sleeping 30s..."
                sleep 30
              done

              cd go-api-examples
              go mod tidy
              go run main.go /workspace/espeak-ng-data
            '

  test-go-package-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Wait for Go proxy
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
          curl -sS "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" || true
          for i in $(seq 1 40); do
            echo "Attempt $i/40: checking..."
            if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
              echo "Available!"
              break
            fi
            echo "Not ready yet, sleeping 30s..."
            sleep 30
          done

      - name: Test released Go package
        run: |
          cd go-api-examples
          go mod tidy
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Wait for Go proxy
        shell: bash
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
          curl -sS "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" || true
          for i in $(seq 1 40); do
            echo "Attempt $i/40: checking..."
            if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
              echo "Available!"
              break
            fi
            echo "Not ready yet, sleeping 30s..."
            sleep 30
          done

      - name: Test released Go package
        shell: bash
        run: |
          cd go-api-examples
          go mod tidy
          # On Windows, DLLs must be in PATH. The Go module cache has them.
          VERSION=$(grep 'piper-phonemize-go ' go.mod | awk '{print $NF}')
          DLL_DIR=$(go env GOMODCACHE)/github.com/csukuangfj/piper-phonemize-go-windows@$VERSION/lib/x86_64-pc-windows-gnu
          export PATH="$DLL_DIR:$PATH"
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-package-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          architecture: '386'

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Wait for Go proxy
        shell: bash
        run: |
          VERSION=$(grep 'piper-phonemize-go ' go-api-examples/go.mod | awk '{print $NF}')
          echo "Waiting for github.com/csukuangfj/piper-phonemize-go@$VERSION on Go proxy..."
          curl -sS "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" || true
          for i in $(seq 1 40); do
            echo "Attempt $i/40: checking..."
            if curl -sS -o /dev/null -w "%{http_code}" "https://proxy.golang.org/github.com/csukuangfj/piper-phonemize-go/@v/$VERSION.info" | grep -q "200"; then
              echo "Available!"
              break
            fi
            echo "Not ready yet, sleeping 30s..."
            sleep 30
          done

      - name: Test released Go package
        shell: bash
        run: |
          cd go-api-examples
          go mod tidy
          # On Windows, DLLs must be in PATH. The Go module cache has them.
          VERSION=$(grep 'piper-phonemize-go ' go.mod | awk '{print $NF}')
          DLL_DIR=$(go env GOMODCACHE)/github.com/csukuangfj/piper-phonemize-go-windows@$VERSION/lib/i686-pc-windows-gnu
          export PATH="$DLL_DIR:$PATH"
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data
