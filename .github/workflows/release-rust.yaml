name: release-rust

on:
  push:
    branches:
      - release
      - release-rust
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Update version
        shell: bash
        run: |
          # For testing: release v0.1.0 with libs from v1.4.7
          RUST_CRATE_VERSION="0.1.0"
          NATIVE_LIB_VERSION="1.4.7"
          echo "RUST_CRATE_VERSION: $RUST_CRATE_VERSION"
          echo "NATIVE_LIB_VERSION: $NATIVE_LIB_VERSION"

          # Update version in Cargo.toml files
          sed -i "s/^version = \".*\"/version = \"$RUST_CRATE_VERSION\"/" rust/piper-phonemize-sys/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$RUST_CRATE_VERSION\"/" rust/piper-phonemize/Cargo.toml
          sed -i "s/version = \".*\"/version = \"$RUST_CRATE_VERSION\"/" rust-api-examples/Cargo.toml

          # Update dependency version
          sed -i "s/piper-phonemize-sys = { path = \"..\/piper-phonemize-sys\", version = \".*\"/piper-phonemize-sys = { path = \"..\/piper-phonemize-sys\", version = \"$RUST_CRATE_VERSION\"/" rust/piper-phonemize/Cargo.toml

          git diff rust/

      - name: Prepare files for publishing
        run: |
          cd rust
          bash publish.sh

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish piper-phonemize-sys
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --allow-dirty --no-verify --manifest-path=rust/piper-phonemize-sys/Cargo.toml
          sleep 30  # Wait for crates.io to index

      - name: Publish piper-phonemize
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --allow-dirty --no-verify --manifest-path=rust/piper-phonemize/Cargo.toml
