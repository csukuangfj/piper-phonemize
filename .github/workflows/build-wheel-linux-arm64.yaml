name: build-wheels-linux-arm64

on:
  push:
    branches:
      - wheel
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-linux-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels_linux_arm64:
    name: ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "cp38"
          - "cp39"
          - "cp310"
          - "cp311"
          - "cp312"
          - "cp313"
          - "cp314"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: arm64

      - name: Build wheel
        shell: bash
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/pypa/manylinux_2_31_aarch64 \
            bash -c '
              set -ex

              case "${{ matrix.python-version }}" in
                cp38)  PY_VER="3.8"  ;;
                cp39)  PY_VER="3.9"  ;;
                cp310) PY_VER="3.10" ;;
                cp311) PY_VER="3.11" ;;
                cp312) PY_VER="3.12" ;;
                cp313) PY_VER="3.13" ;;
                cp314) PY_VER="3.14" ;;
                *) echo "Unknown python version: ${{ matrix.python-version }}"; exit 1 ;;
              esac

              PY_PATH=$(find /opt/_internal -name "cpython-${PY_VER}*" -type d | head -1)/bin
              if [ ! -d "$PY_PATH" ]; then
                PY_PATH=/usr/bin
              fi
              export PATH=$PY_PATH:$PATH
              python3 --version

              python3 -m pip install setuptools wheel pybind11

              cd /workspace
              git clone --depth 1 https://github.com/csukuangfj/espeak-ng
              cd espeak-ng
              git fetch
              git checkout sherpa-onnx
              mkdir my-build
              cd my-build

              cmake \
                -DBUILD_ESPEAK_NG_TESTS=OFF \
                -DBUILD_SHARED_LIBS=ON \
                -DCMAKE_INSTALL_PREFIX=./install \
                -DUSE_MBROLA=OFF \
                -DUSE_LIBSONIC=OFF \
                -DUSE_LIBPCAUDIO=OFF \
                -DUSE_KLATT=OFF \
                -DUSE_SPEECHPLAYER=OFF \
                -DESPEAK_COMPAT=OFF \
                -DEXTRA_cmn=ON \
                -DEXTRA_ru=ON \
                ..
              make -j$(nproc)
              make install

              cd /workspace
              mkdir -p my-build
              cd my-build

              cmake \
                -DESPEAK_NG_DIR=/workspace/espeak-ng/my-build/install \
                -DCMAKE_INSTALL_PREFIX=./install \
                -DBUILD_SHARED_LIBS=ON \
                -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
                ..
              make -j$(nproc)
              make install

              cd /workspace
              cp -a espeak-ng/my-build/install/share/espeak-ng-data piper_phonemize/
              cp -a my-build/install/lib/lib*.so piper_phonemize/ 2>/dev/null || true

              ls -lh piper_phonemize/

              python3 setup.py bdist_wheel --plat-name=manylinux_2_31_aarch64

              ls -lh dist/
              mkdir -p wheelhouse
              cp -v dist/*.whl wheelhouse/
            '

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-arm64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Publish to huggingface
        if: github.ref_name == 'wheel'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"
            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main
            cp -v ../wheelhouse/*.whl .
            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main
