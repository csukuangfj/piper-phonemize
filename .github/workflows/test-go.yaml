name: test-go

on:
  push:
    branches:
      - go-api
  workflow_dispatch:

jobs:
  test-go-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release -j$(nproc)

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/x86_64-unknown-linux-gnu
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/x86_64-unknown-linux-gnu/

          cd $GITHUB_WORKSPACE/go-api-examples
          go mod init go-api-examples
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
