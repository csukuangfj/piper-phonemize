          EOF
          sed -i.bak 's|github.com/csukuangfj/piper-phonemize-go/piper_phonemize|piper_phonemize|g' main.go && rm -f main.go.bak
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-macos-arm64:
