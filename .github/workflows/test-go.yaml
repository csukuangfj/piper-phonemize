          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/aarch64-apple-darwin
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/aarch64-apple-darwin/

