      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/aarch64-unknown-linux-gnu
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/aarch64-unknown-linux-gnu/

          cd $GITHUB_WORKSPACE/go-api-examples
          go mod init go-api-examples
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/aarch64-apple-darwin
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/aarch64-apple-darwin/

          cd $GITHUB_WORKSPACE/go-api-examples
          go mod init go-api-examples
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-macos-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/x86_64-apple-darwin
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/x86_64-apple-darwin/

          cd $GITHUB_WORKSPACE/go-api-examples
          go mod init go-api-examples
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data

  test-go-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        shell: bash
        run: |
          cd scripts/go/_internal
          mkdir -p lib/x86_64-pc-windows-gnu
          # Copy DLLs and import libraries (.lib)
          find $GITHUB_WORKSPACE/build -name "*.dll" -exec cp -v {} lib/x86_64-pc-windows-gnu/ \;
          find $GITHUB_WORKSPACE/build -name "*.lib" -exec cp -v {} lib/x86_64-pc-windows-gnu/ \;
          ls -la lib/x86_64-pc-windows-gnu/

          cd $GITHUB_WORKSPACE/go-api-examples
          go mod init go-api-examples
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go $GITHUB_WORKSPACE/espeak-ng-data
