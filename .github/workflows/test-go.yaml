      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/aarch64-unknown-linux-gnu
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/aarch64-unknown-linux-gnu/

          mkdir -p /tmp/test-go-app
          cp $GITHUB_WORKSPACE/go-api-examples/main.go /tmp/test-go-app/
          cd /tmp/test-go-app
          cat > go.mod << EOF
          module test-go-app

          go 1.17

          require piper_phonemize v0.0.0

