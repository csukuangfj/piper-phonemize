name: test-go

on:
  push:
    branches:
      - go-api
  workflow_dispatch:

jobs:
  test-go-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install espeak-ng
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release -j$(nproc)
          ls -la build/lib/

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/x86_64-unknown-linux-gnu
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/x86_64-unknown-linux-gnu/
          export LD_LIBRARY_PATH=$PWD/lib/x86_64-unknown-linux-gnu:$LD_LIBRARY_PATH

          mkdir -p /tmp/test-go-app
          cd /tmp/test-go-app
          go mod init test-go-app
          cat > main.go << 'EOF'
          package main

          import (
          	"fmt"
          	"os"
          	pp "piper_phonemize"
          )

          func main() {
          	fmt.Println("Version:", pp.GetVersionStr())

          	dataDir := "/usr/share/espeak-ng-data"
          	if len(os.Args) > 1 {
          		dataDir = os.Args[1]
          	}

          	ret := pp.Initialize(dataDir)
          	fmt.Println("Initialize:", ret)

          	result := pp.Phonemize("hello world", "en-us")
          	if result == nil {
          		fmt.Println("Phonemize returned nil")
          		os.Exit(1)
          	}
          	defer pp.DeletePhonemizeResult(result)

          	fmt.Println("Sentences:", result.GetNumSentences())
          	for i := 0; i < result.GetNumSentences(); i++ {
          		phonemes := result.GetPhonemes(i)
          		fmt.Printf("  Sentence %d: %d phonemes %v\n", i, len(phonemes), phonemes)
          	}
          }
          EOF
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go

  test-go-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build piper-phonemize
        run: |
          cmake -Bbuild -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release
          ls -la build/lib/

      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2

      - name: Test Go API
        run: |
          cd scripts/go/_internal
          mkdir -p lib/aarch64-apple-darwin
          cp -v $GITHUB_WORKSPACE/build/lib/libpiper_phonemize* lib/aarch64-apple-darwin/

          mkdir -p /tmp/test-go-app
          cd /tmp/test-go-app
          go mod init test-go-app
          cat > main.go << 'EOF'
          package main

          import (
          	"fmt"
          	"os"
          	pp "piper_phonemize"
          )

          func main() {
          	fmt.Println("Version:", pp.GetVersionStr())

          	dataDir := "$GITHUB_WORKSPACE/espeak-ng-data"
          	if len(os.Args) > 1 {
          		dataDir = os.Args[1]
          	}

          	ret := pp.Initialize(dataDir)
          	fmt.Println("Initialize:", ret)

          	result := pp.Phonemize("hello world", "en-us")
          	if result == nil {
          		fmt.Println("Phonemize returned nil")
          		os.Exit(1)
          	}
          	defer pp.DeletePhonemizeResult(result)

          	fmt.Println("Sentences:", result.GetNumSentences())
          	for i := 0; i < result.GetNumSentences(); i++ {
          		phonemes := result.GetPhonemes(i)
          		fmt.Printf("  Sentence %d: %d phonemes %v\n", i, len(phonemes), phonemes)
          	}
          }
          EOF
          go mod edit -replace piper_phonemize=$GITHUB_WORKSPACE/scripts/go/_internal
          go get piper_phonemize
          go run main.go
