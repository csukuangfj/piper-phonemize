name: build-tauri-apps

on:
  push:
    branches:
      - ci-android
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-tauri-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: linux-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli

      - name: Build
        shell: bash
        run: |
          cd tauri-examples
          cargo tauri build

      - name: Package macOS
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          cd tauri-examples/src-tauri/target/release/bundle/macos
          zip -r "piper-phonemize-tauri-${{ matrix.artifact }}.app.zip" *.app
          mv "piper-phonemize-tauri-${{ matrix.artifact }}.app.zip" ../../../../

      - name: Package Linux
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          cd tauri-examples/src-tauri/target/release
          tar cjf "piper-phonemize-tauri-${{ matrix.artifact }}.tar.bz2" piper-phonemize-tauri
          mv "piper-phonemize-tauri-${{ matrix.artifact }}.tar.bz2" ../../../../

      - name: Package Windows
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          cd tauri-examples/src-tauri/target/release
          7z a "piper-phonemize-tauri-${{ matrix.artifact }}.zip" piper-phonemize-tauri.exe
          mv "piper-phonemize-tauri-${{ matrix.artifact }}.zip" ../../../../

      - name: Upload
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          overwrite: true
          file: piper-phonemize-tauri-*
          tag: v1.4.7

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        shell: bash
        run: |
          sdkmanager --install "ndk;27.0.11718014"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.11718014" >> $GITHUB_ENV

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli

      - name: Init Android project
        shell: bash
        run: |
          cd tauri-examples
          cargo tauri android init

      - name: Fix Gradle JDK
        shell: bash
        run: |
          echo 'org.gradle.java.home=$JAVA_HOME' >> tauri-examples/src-tauri/gen/android/gradle.properties

      - name: Build APK
        shell: bash
        run: |
          cd tauri-examples
          cargo tauri android build
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload APK
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          overwrite: true
          file: tauri-examples/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          tag: v1.4.7
