name: build-wheels-linux

on:
  push:
    branches:
      - wheel
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels_linux:
    name: ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "cp39"
          - "cp310"
          - "cp311"
          - "cp312"
          - "cp313"
          - "cp314"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        shell: bash
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c '
              set -ex

              # Map cibuildwheel python tags to cpython paths
              case "${{ matrix.python-version }}" in
                cp38)  PY_VER="3.8"  ;;
                cp39)  PY_VER="3.9"  ;;
                cp310) PY_VER="3.10" ;;
                cp311) PY_VER="3.11" ;;
                cp312) PY_VER="3.12" ;;
                cp313) PY_VER="3.13" ;;
                cp314) PY_VER="3.14" ;;
                *) echo "Unknown python version: ${{ matrix.python-version }}"; exit 1 ;;
              esac

              # Find the python binary (use head -1 to handle multiple matches like cpython-3.14-nogil)
              PY_PATH=$(ls -d /opt/_internal/cpython-${PY_VER}*/bin 2>/dev/null | grep -v nogil | head -1)
              if [ -z "$PY_PATH" ] || [ ! -d "$PY_PATH" ]; then
                echo "Python $PY_VER not found, trying system python"
                PY_PATH=/usr/bin
              fi
              export PATH=$PY_PATH:$PATH
              python3 --version

              # Install build tools
              python3 -m pip install setuptools wheel pybind11

              # Build piper-phonemize (CMakeLists.txt fetches espeak-ng automatically)
              cd /workspace
              mkdir -p my-build
              cd my-build

              cmake \
                -DCMAKE_INSTALL_PREFIX=./install \
                -DBUILD_SHARED_LIBS=ON \
                -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
                ..
              make -j$(nproc)
              make install

              cd /workspace

              # Copy espeak-ng headers and libs to where setup.py expects them
              mkdir -p espeak-ng/my-build/install/include
              cp -a my-build/_deps/espeak_ng-src/src/include/espeak espeak-ng/my-build/install/include/
              cp -a my-build/_deps/espeak_ng-src/src/include/espeak-ng espeak-ng/my-build/install/include/
              mkdir -p espeak-ng/my-build/install/lib
              cp -a my-build/_deps/espeak_ng-build/src/libespeak-ng/*.a espeak-ng/my-build/install/lib/ 2>/dev/null || true
              cp -a my-build/_deps/espeak_ng-build/src/libespeak-ng/*.so espeak-ng/my-build/install/lib/ 2>/dev/null || true

              # Copy shared libs and data into the package directory
              cp -a my-build/_deps/espeak_ng-src/espeak-ng-data piper_phonemize/ 2>/dev/null || true
              cp -a my-build/install/lib/lib*.so piper_phonemize/ 2>/dev/null || true

              if [ -d my-build/install/lib64 ]; then
                cp -a my-build/install/lib64/lib*.so piper_phonemize/ 2>/dev/null || true
              fi

              ls -lh piper_phonemize/

              # Build the wheel
              cd /workspace
              python3 setup.py bdist_wheel --plat-name=manylinux2014_x86_64

              ls -lh dist/
              mkdir -p wheelhouse
              cp -v dist/*.whl wheelhouse/
            '

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Publish to huggingface
        if: github.ref_name == 'wheel'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"

            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1

            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main

            cp -v ../wheelhouse/*.whl .

            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main
