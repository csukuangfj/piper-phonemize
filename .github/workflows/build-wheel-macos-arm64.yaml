name: build-wheels-macos-arm64

on:
  push:
    branches:
      - wheel
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-macos-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels_macos_arm64:
    name: ${{ matrix.python-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "cp38"
          - "cp39"
          - "cp310"
          - "cp311"
          - "cp312"
          - "cp313"
          - "cp314"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BEFORE_BUILD: |
            my_project=$PWD

            echo "Install espeak-ng"
            git clone --depth 1 https://github.com/csukuangfj/espeak-ng
            cd espeak-ng
            git fetch
            git checkout api
            mkdir my-build
            cd my-build

            cmake \
              -DBUILD_ESPEAK_NG_TESTS=OFF \
              -DBUILD_SHARED_LIBS=ON \
              -DCMAKE_INSTALL_PREFIX=./install \
              -DUSE_MBROLA=OFF \
              -DUSE_LIBSONIC=OFF \
              -DUSE_LIBPCAUDIO=OFF \
              -DUSE_KLATT=OFF \
              -DUSE_SPEECHPLAYER=OFF \
              -DESPEAK_COMPAT=OFF \
              -DEXTRA_cmn=ON \
              -DEXTRA_ru=ON \
              ..
            make -j$(sysctl -n hw.ncpu)
            make install

            cd $my_project

            echo "build piper-phonemize"
            mkdir -p my-build
            cd my-build

            cmake \
              -DESPEAK_NG_DIR=$my_project/espeak-ng/my-build/install \
              -DCMAKE_INSTALL_PREFIX=./install \
              -DBUILD_SHARED_LIBS=ON \
              -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
              -DCMAKE_OSX_ARCHITECTURES=arm64 \
              ..
            make -j$(sysctl -n hw.ncpu)
            make install

            cd $my_project
            cp -a espeak-ng/my-build/install/share/espeak-ng-data piper_phonemize/
            cp -a my-build/install/lib/lib*.dylib piper_phonemize/ 2>/dev/null || true

            ls -lh piper_phonemize/

          CIBW_BUILD: "${{ matrix.python-version}}-* "
          CIBW_ARCHS: "arm64"
          CIBW_BUILD_VERBOSITY: 3

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Publish to huggingface
        if: github.ref_name == 'wheel'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"
            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main
            cp -v ../wheelhouse/*.whl .
            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main
