name: test

on:
  push:
    branches:
      - api
      - c-api
      - cxx-api
  workflow_dispatch:

jobs:
  test_linux_docker:
    name: "linux docker: ${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64, arm/v7]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - name: build
        run: |
          docker buildx build . --platform linux/${{ matrix.arch }}
  test_linux:
    name: "linux test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: |
          cmake -Bbuild -DCMAKE_INSTALL_PREFIX=_install/piper-phonemize -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=ON
      - name: build
        run: |
          cmake --build build --config Release
      - name: install
        run: |
          cmake --install build
      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2
      - name: test c-api
        run: |
          ./build/bin/test-c-api espeak-ng-data
      - name: test cxx-api
        run: |
          ./build/bin/test-cxx-api espeak-ng-data
  test_windows:
    runs-on: windows-latest
    name: "windows build: ${{ matrix.arch }}"
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, Win32]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: |
          cmake -Bbuild -A ${{ matrix.arch }} -DCMAKE_INSTALL_PREFIX=_install/piper-phonemize -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=ON
      - name: build
        run: |
          cmake --build build --config Release
      - name: install
        run: |
          cmake --install build
      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2
      - name: test c-api
        run: |
          .\build\bin\Release\test-c-api.exe espeak-ng-data
      - name: test cxx-api
        run: |
          .\build\bin\Release\test-cxx-api.exe espeak-ng-data
  test_mac:
    name: "mac test: ${{ matrix.arch }}"
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: |
          cmake -Bbuild -DCMAKE_INSTALL_PREFIX=_install/piper-phonemize -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=ON
      - name: build
        run: |
          cmake --build build --config Release
      - name: install
        run: |
          cmake --install build
      - name: Download espeak-ng-data
        run: |
          curl -OL https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
          tar xvf espeak-ng-data.tar.bz2
      - name: test c-api
        run: |
          ./build/bin/test-c-api espeak-ng-data
      - name: test cxx-api
        run: |
          ./build/bin/test-cxx-api espeak-ng-data
