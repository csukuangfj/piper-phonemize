name: build-wheels-macos-x86_64

on:
  push:
    branches:
      - wheel
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-macos-x86_64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels_old:
    name: ${{ matrix.python-version }} (cibuildwheel v2)
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "cp37"
          - "cp38"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "${{ matrix.python-version}}-* "
          CIBW_ARCHS: "x86_64"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_BEFORE_BUILD: pip install pybind11
          CIBW_ENVIRONMENT: PIPER_PHONEMIZE_MAKE_ARGS="-j$(sysctl -n hw.ncpu)" MACOSX_DEPLOYMENT_TARGET="10.14"

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

          echo "---"
          unzip -l ./wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x86_64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Publish to huggingface
        if: github.ref_name == 'wheel'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"
            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main
            cp -v ../wheelhouse/*.whl .
            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main

  build_wheels:
    name: ${{ matrix.python-version }}
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "cp39"
          - "cp310"
          - "cp311"
          - "cp312"
          - "cp313"
          - "cp314"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "${{ matrix.python-version}}-* "
          CIBW_ARCHS: "x86_64"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_BEFORE_BUILD: pip install pybind11
          CIBW_ENVIRONMENT: PIPER_PHONEMIZE_MAKE_ARGS="-j$(sysctl -n hw.ncpu)" MACOSX_DEPLOYMENT_TARGET="10.14"

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

          echo "---"
          unzip -l ./wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x86_64-${{ matrix.python-version }}
          path: wheelhouse/*.whl

      - name: Publish to huggingface
        if: github.ref_name == 'wheel'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"
            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main
            cp -v ../wheelhouse/*.whl .
            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main
