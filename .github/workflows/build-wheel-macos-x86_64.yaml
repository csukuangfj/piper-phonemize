name: build-wheels-macos-x86_64

on:
  push:
    branches:
      - wheel
      - wheels-for-sherpa-onnx

    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-wheels-macos-x86_64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels_macos_x86-64:
    name: ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13]
        python-version: ["cp38", "cp39", "cp310", "cp311", "cp312", "cp13"]

    steps:
      - uses: actions/checkout@v4

      # see https://cibuildwheel.readthedocs.io/en/stable/changelog/
      # for a list of versions
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
        env:
          CIBW_BEFORE_BUILD: |
            echo "Install espeak-ng"
            git clone https://github.com/csukuangfj/espeak-ng
            cd espeak-ng
            git fetch
            git checkout sherpa-onnx
            mkdir my-build
            cd my-build

            cmake \
              -DBUILD_ESPEAK_NG_TESTS=OFF \
              -DBUILD_ESPEAK_NG_EXE=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              -DCMAKE_INSTALL_PREFIX=./install \
              -DUSE_MBROLA=OFF \
              -DUSE_LIBSONIC=OFF \
              -DUSE_LIBPCAUDIO=OFF \
              -DUSE_KLATT=OFF \
              -DUSE_SPEECHPLAYER=OFF \
              -DESPEAK_COMPAT=OFF \
              -DEXTRA_cmn=ON \
              -DEXTRA_ru=ON \
              ..
            make -j
            make install

            cd ../..

            echo "----here----"
            find . -name "speak_lib.h"
            find . -name "libespeak-ng*dylib*"
            echo "----here-..-..--"

            curl -SL -O https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/espeak-ng-data.tar.bz2
            tar xf espeak-ng-data.tar.bz2
            rm espeak-ng-data.tar.bz2
            mv espeak-ng-data ./piper_phonemize

            ls -lh

          CIBW_BUILD: "${{ matrix.python-version}}-* "
          CIBW_ARCHS: "x86_64"
          CIBW_BUILD_VERBOSITY: 3
          # CIBW_ENVIRONMENT: |
          #   DYLD_LIBRARY_PATH='/Users/runner/work/piper-phonemize/piper-phonemize/espeak-ng/my-build/src/libespeak-ng:/Users/runner/work/piper-phonemize/piper-phonemize/my-build/install/lib'
          #   LD_LIBRARY_PATH='/Users/runner/work/piper-phonemize/piper-phonemize/espeak-ng/my-build/src/libespeak-ng:/Users/runner/work/piper-phonemize/piper-phonemize/my-build/install/lib'

          # Don't repair macOS wheels
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""

      - name: Display wheels
        shell: bash
        run: |
          ls -lh ./wheelhouse/

      - name: Release to csukuangfj/piper-phonemize
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: wheelhouse/*.whl
          overwrite: true
          tag: 2025.06.23

      - name: Publish to huggingface
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"

            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1

            git clone https://huggingface.co/csukuangfj/piper-phonemize-wheels huggingface
            cd huggingface
            git lfs track "*.whl"
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main

            cp -v ../wheelhouse/*.whl .

            git status
            git add .
            git commit -m "add more wheels"
            git push https://csukuangfj:$HF_TOKEN@huggingface.co/csukuangfj/piper-phonemize-wheels main
