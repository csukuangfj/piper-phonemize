name: build-rust-libs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-rust-libs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-x64-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}/:/shared/ \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c '
              cd /shared
              mkdir -p build && cd build
              cmake \
                -DCMAKE_INSTALL_PREFIX=./install \
                -DBUILD_SHARED_LIBS=OFF \
                -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
                -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
                ..
              make -j$(nproc) install
            '
          VERSION=$(grep "set(PIPER_PHONEMIZE_VERSION" ${{ github.workspace }}/CMakeLists.txt | sed 's/.*set(PIPER_PHONEMIZE_VERSION \(.*\))/\1/' | tr -d ' ")')
          cd build/install/lib
          tar cjf ../../../piper-phonemize-v${VERSION}-linux-x64-static-lib.tar.bz2 *.a

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: piper-phonemize-*.tar.bz2

  build-linux-arm64-static:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
            -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
            ..
          make -j$(nproc) install
          VERSION=$(grep "set(PIPER_PHONEMIZE_VERSION" ${{ github.workspace }}/CMakeLists.txt | sed 's/.*set(PIPER_PHONEMIZE_VERSION \(.*\))/\1/' | tr -d ' ")')
          cd install/lib
          tar cjf ../../../piper-phonemize-v${VERSION}-linux-arm64-static-lib.tar.bz2 *.a

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: piper-phonemize-*.tar.bz2

  build-macos-x64-static:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
            -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
            ..
          make -j$(sysctl -n hw.ncpu) install
          VERSION=$(grep "set(PIPER_PHONEMIZE_VERSION" ${{ github.workspace }}/CMakeLists.txt | sed 's/.*set(PIPER_PHONEMIZE_VERSION \(.*\))/\1/' | tr -d ' ")')
          cd install/lib
          tar cjf ../../../piper-phonemize-v${VERSION}-macos-x64-static-lib.tar.bz2 *.a

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: piper-phonemize-*.tar.bz2

  build-macos-arm64-static:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
            -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF \
            ..
          make -j$(sysctl -n hw.ncpu) install
          VERSION=$(grep "set(PIPER_PHONEMIZE_VERSION" ${{ github.workspace }}/CMakeLists.txt | sed 's/.*set(PIPER_PHONEMIZE_VERSION \(.*\))/\1/' | tr -d ' ")')
          cd install/lib
          tar cjf ../../../piper-phonemize-v${VERSION}-macos-arm64-static-lib.tar.bz2 *.a

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: piper-phonemize-*.tar.bz2

  build-windows-x64-shared:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          cmake -Bbuild \
            -DCMAKE_INSTALL_PREFIX=build/install \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_PIPER_PHONEMIZE_PYTHON=OFF \
            -DBUILD_PIPER_PHONEMIZE_CORE_TESTS=OFF
          cmake --build build --config Release --target install
          VERSION=$(grep "set(PIPER_PHONEMIZE_VERSION" ${{ github.workspace }}/CMakeLists.txt | sed 's/.*set(PIPER_PHONEMIZE_VERSION \(.*\))/\1/' | tr -d ' ")')
          cd build/install
          tar cjf ../../piper-phonemize-v${VERSION}-windows-x64-shared-lib.tar.bz2 bin/*.dll lib/*.lib

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: piper-phonemize-*.tar.bz2
